document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e href=\"#sunstone-mark\"><\u002Fuse>\n    <\u002Fsvg>\n    <div class=\"hero-gradient\"><\u002Fdiv>\n    <div class=\"hero-inner reveal\">\n      <h1 class=\"hero-headline\">Advisory for high-stakes transactions — M&amp;A, exits,<br>fundraising and ownership transitions.<\u002Fh1>\n      <hr class=\"divider-line\" style=\"margin: 14px 0;\">\n      <p class=\"hero-subtitle\">With the perspective of an investor.<\u002Fp>\n      <a href=\"#contact\" class=\"hero-cta\">Get in touch<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"scroll-ind\" aria-hidden=\"true\"><span>SCROLL<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STORY (Sun) -->\n  <section id=\"story\" class=\"sun-side\" data-tone=\"sun\" aria-labelledby=\"story-label\">\n    <div class=\"wrap\">\n      <div class=\"story-grid\">\n        <div class=\"story-copy reveal-left\">\n          <div class=\"section-label\" id=\"story-label\">ABOUT SUNSTONE<\u002Fdiv>\n          <h2 class=\"display\">An investor’s perspective, on your side of the table.<\u002Fh2>\n          <p>Sunstone Advisory works with companies, founders, family businesses and investors in situations where ownership, leadership and capital intersect.<\u002Fp>\n          <p>Most advisors have seen deals from one side of the table — as banker or investor. Sunstone brings both perspectives, combining years of deal execution with private equity experience in assessing, negotiating, owning and selling companies.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"story-panel reveal\">\n          <svg aria-hidden=\"true\" style=\"color: #1C1A18;\">\n            <use href=\"#sunstone-mark\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stats stagger-up\" aria-label=\"Firm at a glance\">\n        <div class=\"stat\"><div class=\"v\" data-count=\"2017\" data-suffix=\"\">2017<\u002Fdiv><span class=\"l\">Founded<\u002Fspan><\u002Fdiv>\n        <div class=\"stat\"><div class=\"v\" data-count=\"100\" data-suffix=\"+\">100+<\u002Fdiv><span class=\"l\">Opportunities assessed<\u002Fspan><\u002Fdiv>\n        <div class=\"stat\"><div class=\"v\" data-count=\"20\" data-suffix=\"+\">20+<\u002Fdiv><span class=\"l\">Transactions closed<\u002Fspan><\u002Fdiv>\n        <div class=\"stat\"><div class=\"v\" data-count=\"3\" data-suffix=\"\">3<\u002Fdiv><span class=\"l\">Service lines<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES (Sun) -->\n  <section id=\"services\" class=\"cream-bg sun-side\" data-tone=\"sun\" aria-labelledby=\"services-label\">\n    <div class=\"wrap\">\n      <div class=\"services-head reveal\">\n        <div class=\"section-label\" id=\"services-label\">SERVICES<\u002Fdiv>\n        <h2 class=\"display\">Where we help.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"services-grid stagger-up\">\n        <article class=\"svc-card\">\n          <div class=\"svc-body\">\n            <h3>M&amp;A Advisory <br>(Buy &amp; Sell)<\u002Fh3>\n            <ul class=\"svc-list\">\n              <li>Process preparation and management<\u002Fli>\n              <li>Due diligence oversight and review<\u002Fli>\n              <li>Valuation, structuring and financing<\u002Fli>\n              <li>Negotiation and documentation<\u002Fli>\n              <li>Closing<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Farticle>\n        <article class=\"svc-card\">\n          <div class=\"svc-body\">\n            <h3>Portfolio Work &amp; Exit Support<\u002Fh3>\n            <ul class=\"svc-list\">\n              <li>Value creation execution<\u002Fli>\n              <li>Add-on acquisitions<\u002Fli>\n              <li>Investor and board interactions<\u002Fli>\n              <li>Financing &amp; refinancing<\u002Fli>\n              <li>Equity story and BP refinement<\u002Fli>\n              <li>Exit preparation and process<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Farticle>\n        <article class=\"svc-card\">\n          <div class=\"svc-body\">\n            <h3>Fundraising Advisory<\u002Fh3>\n            <ul class=\"svc-list\">\n              <li>Process drive and execution<\u002Fli>\n              <li>Equity story and materials<\u002Fli>\n              <li>Q&amp;A preparation and management<\u002Fli>\n              <li>Investor follow-up and tracking<\u002Fli>\n              <li>Term sheet and documentation<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TRANSITION (Sun → Stone) -->\n  <section class=\"transition\" aria-hidden=\"false\" data-tone=\"stone\">\n    <div class=\"dot-grid\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"transition-inner reveal\">\n      <hr class=\"divider-line\">\n      <blockquote class=\"transition-quote\">\n        <em>Rigorous in execution.<br>Pragmatic in approach.<br>Easy to work with.<\u002Fem>\n      <\u002Fblockquote>\n      <hr class=\"divider-line bottom\">\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- APPROACH (Stone) -->\n  <section id=\"approach\" class=\"stone-bg\" data-tone=\"stone\" aria-labelledby=\"approach-label\">\n    <div class=\"wrap\">\n      <div class=\"approach-head reveal\">\n        <div class=\"section-label\" id=\"approach-label\">OUR APPROACH<\u002Fdiv>\n        <h2 class=\"display\">The Sun and the Stone — two halves of how we work.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"approach-grid stagger-up\">\n        <div class=\"approach-col approach-col--stone\">\n          <svg class=\"approach-bg approach-bg--stone\" viewBox=\"0 0 21.05 21.05\" aria-hidden=\"true\" preserveAspectRatio=\"xMidYMid meet\">\n            <polygon points=\"9.06 0 0 0 0 21.05 21.05 21.05 21.05 11.97\" fill=\"currentColor\"><\u002Fpolygon>\n          <\u002Fsvg>\n          <div class=\"approach-word\">STONE<\u002Fdiv>\n          <p class=\"approach-sub\">Rigorous. Structured. Reliable.<\u002Fp>\n          <p class=\"approach-body\">Discipline in preparation, structure in execution, repeatability in delivery. Every mandate treated as a closed loop — assumptions tested, risks surfaced early, documents built to withstand scrutiny.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"approach-col approach-col--sun\">\n          <svg class=\"approach-bg approach-bg--sun\" viewBox=\"0 0 21.05 21.05\" aria-hidden=\"true\" preserveAspectRatio=\"xMidYMid meet\">\n            <polygon points=\"11.22 0 21.05 9.79 21.05 0\" fill=\"currentColor\"><\u002Fpolygon>\n          <\u002Fsvg>\n          <div class=\"approach-word\">SUN<\u002Fdiv>\n          <p class=\"approach-sub\">Clear. Pragmatic. Easy to work with.<\u002Fp>\n          <p class=\"approach-body\">Clarity of judgment and directness of relationship. We say what we think, we write what we mean, and we stay close — reachable, responsive, and plainly focused on the outcome you care about.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY SUNSTONE (Stone, bento) -->\n  <section id=\"why-sunstone\" class=\"stone-bg\" data-tone=\"stone\" aria-labelledby=\"why-label\">\n    <div class=\"wrap\">\n      <div class=\"why-head reveal\">\n        <div class=\"section-label\" id=\"why-label\">WHY SUNSTONE<\u002Fdiv>\n        <h2 class=\"display\">What separates us.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"bento stagger-up\">\n        <article class=\"bento-card bento-large\">\n          <span class=\"bento-ornament\" aria-hidden=\"true\">20+<\u002Fspan>\n          <h3>Experienced partner.<\u002Fh3>\n          <p>20+ transactions closed across M&amp;A advisory and private equity — from large-cap flagship investments to mid-market acquisitions, disposals, add-ons, financings and fundraisings.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"bento-card\">\n          <h3>A critical sounding board.<\u002Fh3>\n          <p>Beyond process and deliverables, we challenge analysis, pressure-test assumptions and sharpen investment cases — whether assessing an opportunity or preparing for investor scrutiny.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"bento-card\">\n          <h3>Hands-on approach.<\u002Fh3>\n          <p>Not just advising, but actively involved. We structure, negotiate, drive and decide together. Every mandate handled directly — no layers, no dilution.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div class=\"bento-footer reveal\">\n        <h3>Independent and fully aligned.<\u002Fh3>\n        <p>No conflicts of interest, no proprietary products to push, no cross-selling agendas — fully aligned with your objectives.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOUNDER (Stone) -->\n  <section id=\"founder\" class=\"stone-bg\" data-tone=\"stone\" aria-labelledby=\"founder-label\">\n    <div class=\"wrap\">\n      <div class=\"founder-head reveal\">\n        <div class=\"section-label\" id=\"founder-label\">FOUNDER<\u002Fdiv>\n        <h2 class=\"founder-name-h2\">Marine Charbonnier<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"founder-card reveal\">\n        <div class=\"founder-portrait\" aria-hidden=\"true\"><span>MC<\u002Fspan><\u002Fdiv>\n        <div class=\"founder-text\">\n          <p>A decade in investment banking and private equity — first structuring and executing deals at Deutsche Bank, then assessing, negotiating, owning and selling them as an investor at Carlyle’s European Buyout fund. Over a hundred opportunities assessed and 20+ closed.<\u002Fp>\n          <p class=\"note\">Sunstone Advisory is built on that experience, and the conviction that the best transaction support comes from understanding not only how processes work, but how investors really think.<\u002Fp>\n          <div class=\"badges\" aria-label=\"Background\">\n            <span class=\"badge\">Deutsche Bank<\u002Fspan>\n            <span class=\"badge\">Carlyle<\u002Fspan>\n            <span class=\"badge\">Dauphine<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"founder-echo reveal\">\n        <blockquote>Rigorous in execution. Pragmatic in approach. Easy to work with.<\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RESERVE / CONTACT (Stone deep) -->\n  <section id=\"contact\" class=\"reserve\" data-tone=\"stone\" aria-labelledby=\"contact-label\">\n    <div class=\"reserve-watermark\" aria-hidden=\"true\">SUNSTONE<\u002Fdiv>\n    <div class=\"reserve-overlay\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"reserve-inner reveal\">\n      <div class=\"section-label\">GET IN TOUCH<\u002Fdiv>\n      <h2 id=\"contact-label\">Let’s talk.<\u002Fh2>\n      <p class=\"sub\">Based in Paris, France. Working globally. Reachable in French and English.<\u002Fp>\n      <a href=\"mailto:marine@sunstoneadvisory.com\" class=\"reserve-cta\">Get in touch<\u002Fa>\n      <div class=\"reserve-contact\">\n        <a href=\"mailto:marine@sunstoneadvisory.com\">marine@sunstoneadvisory.com<\u002Fa>\n        <a href=\"https://linkedin.com/in/marinecharbonnier\" target=\"_blank\" rel=\"noopener\">linkedin.com/in/marinecharbonnier<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- FOOTER -->\n<footer data-tone=\"stone\">\n  <div class=\"f-grid\">\n    <div class=\"f-col\">\n      <a href=\"#top\" class=\"f-wordmark\" aria-label=\"Sunstone Advisory — home\">\n        <svg class=\"logo-svg logo-svg--footer\" viewBox=\"0 0 85.89 21.05\" aria-hidden=\"true\" xmlns=\"http://www.w3.org/2000/svg\">\n          <polygon points=\"9.06 0 0 0 0 21.05 21.05 21.05 21.05 11.97\" fill=\"#FAFAF7\"><\u002Fpolygon>\n          <polygon points=\"11.22 0 21.05 9.79 21.05 0\" fill=\"#C2A052\"><\u002Fpolygon>\n          <g fill=\"#C2A052\">\n            <path d=\"M27.49,10.03c-.46-.18-.82-.45-1.08-.83s-.38-.84-.35-1.4h1.07c0,.58.17,1,.54,1.26s.84.38,1.44.38c.53,0,.97-.11,1.31  + 4;\n    for (const s of toneSections) {\n      const r = s.getBoundingClientRect();\n      if (r.top <= probeY && r.bottom > probeY) return s.dataset.tone;\n    }\n    return 'sun';\n  }\n\n  function onScroll() {\n    const scrolled = window.scrollY > 40;\n    const tone = currentTone();\n    nav.classList.toggle('scrolled-sun', scrolled && tone === 'sun');\n    nav.classList.toggle('scrolled-stone', scrolled && tone === 'stone');\n    nav.classList.toggle('on-stone', !scrolled && tone === 'stone');\n  }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  window.addEventListener('resize', onScroll);\n  onScroll();\n\n  // ---------- Mobile menu ----------\n  const burger = document.getElementById('burger');\n  const mobileMenu = document.getElementById('mobileMenu');\n  burger.addEventListener('click', () => {\n    const open = mobileMenu.classList.toggle('open');\n    burger.setAttribute('aria-expanded', String(open));\n    document.body.style.overflow = open ? 'hidden' : '';\n  });\n  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {\n    mobileMenu.classList.remove('open');\n    burger.setAttribute('aria-expanded', 'false');\n    document.body.style.overflow = '';\n  }));\n\n  // ---------- Reveal + count-up ----------\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        if (e.target.classList.contains('stats')) {\n          e.target.querySelectorAll('[data-count]').forEach(el => {\n            const target = parseInt(el.dataset.count, 10);\n            const suffix = el.dataset.suffix || '';\n            const duration = 1200;\n            const start = performance.now();\n            const step = (now) => {\n              const t = Math.min(1, (now - start) / duration);\n              const eased = 1 - Math.pow(1 - t, 3);\n              el.textContent = Math.round(target * eased) + suffix;\n              if (t < 1) requestAnimationFrame(step);\n              else el.textContent = target + suffix;\n            };\n            requestAnimationFrame(step);\n          });\n        }\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.14, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal, .reveal-left, .stagger-up').forEach(el => io.observe(el));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
