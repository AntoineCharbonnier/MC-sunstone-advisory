<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunstone — D — Monogramme S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e6e2db;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .card {
    background: #ffffff;
    width: 480px;
    padding: 88px 56px 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 64px;
  }

  .mark {
    flex-shrink: 0;
  }

  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .wm-name {
    font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.28em;
    color: #1a2744;
    line-height: 1;
    text-transform: uppercase;
  }

  .wm-advisory {
    font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.44em;
    color: #aaaaaa;
    text-transform: uppercase;
  }

  .label {
    font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.16em;
    color: #555555;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo-row">

    <div class="mark">
      <!-- Reproduction exacte du variant D issu du fichier sunstone_logo_circle_variants.html -->
      <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">

        <!-- Cercle fin charbon -->
        <circle cx="30" cy="30" r="24"
          fill="none"
          stroke="#1c1c1a"
          stroke-width="1.2"
        />

        <!-- Arc supérieur gold (SUN) -->
        <path d="M 16,24 A 16,16 0 0,1 44,24"
          fill="none"
          stroke="#c9903a"
          stroke-width="2"
          stroke-linecap="round"
        />

        <!-- Arc inférieur charbon (STONE) -->
        <path d="M 16,36 A 16,16 0 0,0 44,36"
          fill="none"
          stroke="#1c1c1a"
          stroke-width="2"
          stroke-linecap="round"
        />

        <!-- Point gold haut-gauche -->
        <circle cx="16" cy="24" r="2.8" fill="#c9903a"/>

        <!-- Point gold bas-droite -->
        <circle cx="44" cy="36" r="2.8" fill="#c9903a"/>

      </svg>
    </div>

    <div class="wordmark">
      <div class="wm-name">Sunstone</div>
      <div class="wm-advisory">Advisory</div>
    </div>

  </div>

  <div class="label">D &mdash;&ensp;Monogramme S</div>

</div>
</body>
</html>
