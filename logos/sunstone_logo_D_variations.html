
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; background: #e0e0e0; max-width: 900px; margin: 0 auto; }
  .cell { background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px 28px; gap: 16px; min-height: 200px; }
  .cell.dk { background: #1a2640; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; color: #8a9ab5; font-family: var(--font-sans); text-transform: uppercase; text-align: center; }
  .lbl.w { color: #4a6080; }
</style>

<div class="grid">

  <!-- D original retravaillé — arcs plus ronds, terminaux plus nets -->
  <div class="cell">
    <svg width="200" height="60" viewBox="0 0 200 60">
      <g transform="translate(26,30)">
        <path d="M -11,-4 A 12,12 0 0,1 11,-4" fill="none" stroke="#1a2640" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M -11,4 A 12,12 0 0,0 11,4" fill="none" stroke="#1a2640" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="-11" y1="0" x2="11" y2="0" stroke="#b8962e" stroke-width="1.8"/>
        <circle cx="-11" cy="-4" r="2.2" fill="#b8962e"/>
        <circle cx="11" cy="4" r="2.2" fill="#b8962e"/>
      </g>
      <text x="50" y="26" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#1a2640" letter-spacing="3">SUNSTONE</text>
      <text x="50" y="41" font-family="var(--font-sans)" font-size="8" fill="#b8962e" letter-spacing="4.5">ADVISORY</text>
    </svg>
    <div class="lbl w">D original affiné</div>
  </div>

  <!-- D2 — S dans un cercle parfait, rappel soleil -->
  <div class="cell">
    <svg width="200" height="60" viewBox="0 0 200 60">
      <g transform="translate(26,30)">
        <!-- Cercle soleil -->
        <circle cx="0" cy="0" r="20" fill="none" stroke="#b8962e" stroke-width="1"/>
        <!-- S intérieur -->
        <path d="M -8,-3 A 9,9 0 0,1 8,-3" fill="none" stroke="#1a2640" stroke-width="2" stroke-linecap="round"/>
        <path d="M -8,3 A 9,9 0 0,0 8,3" fill="none" stroke="#1a2640" stroke-width="2" stroke-linecap="round"/>
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#b8962e" stroke-width="1.5"/>
        <circle cx="-8" cy="-3" r="1.8" fill="#b8962e"/>
        <circle cx="8" cy="3" r="1.8" fill="#b8962e"/>
      </g>
      <text x="56" y="26" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#1a2640" letter-spacing="3">SUNSTONE</text>
      <text x="56" y="41" font-family="var(--font-sans)" font-size="8" fill="#b8962e" letter-spacing="4.5">ADVISORY</text>
    </svg>
    <div class="lbl w">D2 — S dans cercle</div>
  </div>

  <!-- D3 — S plein dans disque doré -->
  <div class="cell">
    <svg width="200" height="60" viewBox="0 0 200 60">
      <g transform="translate(26,30)">
        <!-- Disque doré -->
        <circle cx="0" cy="0" r="20" fill="#b8962e" stroke="none"/>
        <!-- S blanc intérieur -->
        <path d="M -8,-3 A 9,9 0 0,1 8,-3" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M -8,3 A 9,9 0 0,0 8,3" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#1a2640" stroke-width="1.5"/>
        <circle cx="-8" cy="-3" r="1.8" fill="#1a2640"/>
        <circle cx="8" cy="3" r="1.8" fill="#1a2640"/>
      </g>
      <text x="56" y="26" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#1a2640" letter-spacing="3">SUNSTONE</text>
      <text x="56" y="41" font-family="var(--font-sans)" font-size="8" fill="#8a9ab5" letter-spacing="4.5">ADVISORY</text>
    </svg>
    <div class="lbl w">D3 — disque doré plein</div>
  </div>

  <!-- D4 dark — S dans cercle sur fond sombre -->
  <div class="cell dk">
    <svg width="200" height="60" viewBox="0 0 200 60">
      <g transform="translate(26,30)">
        <circle cx="0" cy="0" r="20" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <path d="M -8,-3 A 9,9 0 0,1 8,-3" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        <path d="M -8,3 A 9,9 0 0,0 8,3" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#c9a84c" stroke-width="1.5"/>
        <circle cx="-8" cy="-3" r="1.8" fill="#c9a84c"/>
        <circle cx="8" cy="3" r="1.8" fill="#c9a84c"/>
      </g>
      <text x="56" y="26" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#ffffff" letter-spacing="3">SUNSTONE</text>
      <text x="56" y="41" font-family="var(--font-sans)" font-size="8" fill="#c9a84c" letter-spacing="4.5">ADVISORY</text>
    </svg>
    <div class="lbl">D2 — fond sombre</div>
  </div>

  <!-- D5 — S avec cercle pointillé, plus léger -->
  <div class="cell">
    <svg width="200" height="60" viewBox="0 0 200 60">
      <g transform="translate(26,30)">
        <circle cx="0" cy="0" r="20" fill="none" stroke="#b8962e" stroke-width="0.8" stroke-dasharray="2.5 3"/>
        <path d="M -9,-3.5 A 10,10 0 0,1 9,-3.5" fill="none" stroke="#1a2640" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M -9,3.5 A 10,10 0 0,0 9,3.5" fill="none" stroke="#1a2640" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="-9" y1="0" x2="9" y2="0" stroke="#b8962e" stroke-width="1.6"/>
        <circle cx="-9" cy="-3.5" r="2" fill="#b8962e"/>
        <circle cx="9" cy="3.5" r="2" fill="#b8962e"/>
      </g>
      <text x="56" y="26" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#1a2640" letter-spacing="3">SUNSTONE</text>
      <text x="56" y="41" font-family="var(--font-sans)" font-size="8" fill="#b8962e" letter-spacing="4.5">ADVISORY</text>
    </svg>
    <div class="lbl w">D5 — cercle pointillé</div>
  </div>

  <!-- D6 — S standalone grand format, sans wordmark, pour favicon/usage seul -->
  <div class="cell">
    <svg width="200" height="100" viewBox="0 0 200 100">
      <g transform="translate(100,50)">
        <circle cx="0" cy="0" r="38" fill="none" stroke="#b8962e" stroke-width="1.2"/>
        <path d="M -16,-6 A 18,18 0 0,1 16,-6" fill="none" stroke="#1a2640" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M -16,6 A 18,18 0 0,0 16,6" fill="none" stroke="#1a2640" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="#b8962e" stroke-width="2.5"/>
        <circle cx="-16" cy="-6" r="3.5" fill="#b8962e"/>
        <circle cx="16" cy="6" r="3.5" fill="#b8962e"/>
      </g>
    </svg>
    <div class="lbl w">Symbole seul — favicon / cachet</div>
  </div>

</div>
